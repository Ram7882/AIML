<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Page</title>
  
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      padding: 20px;
      background-color: #f8f9fa;
    }
    h1 {
      color: #007bff;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Welcome to the Demo Page</h1>
    <p>This is a simple HTML template you can customize.</p>
    
    <button class="btn btn-primary" onclick="showMessage()">Click Me</button>
    <p id="output"></p>
  </div>

  <!-- JavaScript -->
  <script>
    function showMessage() {
      document.getElementById("output").textContent = "You clicked the button!";
    }
  </script>

  <!-- Bootstrap JS Bundle (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
